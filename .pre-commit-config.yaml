# Pre-commit hooks for DRG.
# Install:    pip install -e ".[dev]" && pre-commit install
# Run all:    pre-commit run --all-files
repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: ["--maxkb=512"]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: ["--fix=lf"]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    # Pinned to a recent Ruff that matches the local dev env. UP038 was
    # removed by Astral; older hooks (v0.5.7) still flag it as an
    # unsafe-fix lint, which would fail CI even though `ruff check`
    # in the same dev env is clean.
    rev: v0.15.14
    hooks:
      - id: ruff
        args: ["--fix"]
      - id: ruff-format

  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.15.0
    hooks:
      - id: mypy
        additional_dependencies:
          - "pydantic>=2.0.0"
        files: ^drg/
        # Gradual mode: see [tool.mypy] in pyproject.toml
