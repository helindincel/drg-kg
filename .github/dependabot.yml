# Dependabot configuration for DRG-KG.
#
# Purpose:
#   - Auto-open weekly PRs for outdated Python dependencies (pyproject.toml)
#     and GitHub Actions versions (workflows under .github/workflows/).
#   - Group minor/patch bumps so the review queue stays manageable; major
#     bumps still ship as individual PRs because they more often need code
#     changes.
#
# Cadence:
#   - Mondays at 06:00 UTC (off-peak; minimal contention with CI).
#
# Reviewer / label policy:
#   - All dependency PRs are labelled "dependencies" so they're easy to
#     filter; CI must still pass before merge.
#
# Reference: https://docs.github.com/en/code-security/dependabot/dependabot-version-updates/configuration-options-for-the-dependabot.yml-file
version: 2

updates:
  # --------------------------------------------------------------------
  # Python dependencies declared in pyproject.toml.
  # --------------------------------------------------------------------
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "python"
    commit-message:
      prefix: "deps"
      include: "scope"
    # Group minor/patch bumps, but leave future major dependency jumps
    # as standalone PRs so API migrations stay reviewable.
    groups:
      python-minor-and-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
  # --------------------------------------------------------------------
  # GitHub Actions used by .github/workflows/*.yml.
  # --------------------------------------------------------------------
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
      time: "06:00"
      timezone: "Etc/UTC"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
    commit-message:
      prefix: "ci"
      include: "scope"
    groups:
      actions-minor-and-patch:
        applies-to: "version-updates"
        update-types:
          - "minor"
          - "patch"
