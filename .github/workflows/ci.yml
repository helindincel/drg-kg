name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

# Avoid duplicate runs when a PR is opened from a branch in the same repo.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Ruff (check)
        run: ruff check drg tests examples

      - name: Ruff (format check)
        run: ruff format --check drg tests examples

  typecheck:
    name: Type check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dev tooling
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Mypy
        # Gradual mode: only fail on hard errors, not missing annotations.
        run: mypy drg

  test:
    name: Tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: "pip"

      - name: Install package + dev extras
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run non-integration tests
        # Integration tests require live LLM keys and are skipped in CI.
        run: pytest -m "not integration" --cov=drg --cov-report=xml --cov-report=term

      - name: Upload coverage artifact
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: ignore

      - name: Upload coverage to Codecov
        # Only upload once per CI run (from the 3.11 job) to avoid
        # double-counting the same numbers across the matrix. Public
        # repos can upload without a token; we still pass CODECOV_TOKEN
        # when configured so private clones and Codecov's anti-spam
        # rate limit keep working. The `fail_ci_if_error: false` keeps
        # CI green if Codecov is temporarily unavailable — the test
        # job has already provided pass/fail signal.
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v7
        with:
          files: ./coverage.xml
          flags: unittests
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  precommit:
    name: Pre-commit hooks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install package + dev extras
        # Pre-commit's mypy hook resolves type stubs against the
        # installed code (pydantic, dspy, …); the cleanest way to
        # match local dev behaviour is to install the package itself.
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run pre-commit on all files
        # Uses the official action for hook caching (substantially
        # faster than a plain `pre-commit run --all-files` on cold CI).
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: --all-files --show-diff-on-failure
